<!--
	Blank-canvas page template (intentional structural variation).

	The site header and section navigation are deliberately omitted so this
	template can serve as a full-bleed landing canvas — campaign pages, cover
	stories, and standalone editorial features that supply their own chrome via
	page content. The skip-link target (main#main-content) and the footer
	template part are retained so keyboard navigation and site landmarks stay
	intact; only the masthead header is dropped. Per WCAG 2.1 1.3.1 the empty h1
	below is always present for editors to fill.
-->
<!-- wp:group {"tagName":"main","id":"main-content","layout":{"type":"default"}} -->
<main class="wp-block-group" id="main-content">

	<!-- Page heading (required per WCAG 2.1 1.3.1). Empty by design; add a title
	     in the Site Editor. Do not delete this block. -->
	<!-- wp:heading {"level":1} -->
	<h1></h1>
	<!-- /wp:heading -->

	<!-- wp:post-content {"layout":{"type":"default"},"className":"np-page-blank"} /-->

</main>
<!-- /wp:group -->
