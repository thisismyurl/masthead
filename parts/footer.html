<!-- wp:group {"className":"np-footer","tagName":"footer","metadata":{"name":"Footer"},"layout":{"type":"constrained","contentSize":"1280px"}} -->
<footer class="wp-block-group np-footer">

	<!-- Top footer: columns -->
	<!-- wp:columns {"isStackedOnMobile":true,"className":"np-footer__columns","style":{"spacing":{"blockGap":{"top":"var:preset|spacing|8","left":"var:preset|spacing|12"}}}} -->
	<div class="wp-block-columns is-layout-flex wp-container-core-columns np-footer__columns">

		<!-- Column 1: Branding + about -->
		<!-- wp:column {"width":"33.33%"} -->
		<div class="wp-block-column" style="flex-basis:33.33%">

			<!-- Nameplate inherits the footer's edition-stable light text
			     (.np-footer color: --np-footer-fg); it must NOT bind the
			     paper-white token, which inverts to a dark value in the
			     Midnight and Broadsheet editions and would render the
			     nameplate near-invisibly dark-on-dark. -->
			<!-- wp:site-title {"level":0,"isLink":true,"className":"np-footer__nameplate"} /-->

			<!-- wp:site-tagline {"className":"np-footer__tagline","style":{"color":{"text":"rgba(248,248,246,0.55)"}}} /-->

			<!-- wp:paragraph {"className":"np-footer__about","style":{"color":{"text":"rgba(248,248,246,0.6)"},"typography":{"fontSize":"0.875rem","fontFamily":"var:preset|font-family|inter","lineHeight":"1.65"}}} -->
			<p class="np-footer__about" style="color:rgba(248,248,246,0.6);font-family:var(--wp--preset--font-family--inter);font-size:0.875rem;line-height:1.65">
				Add your publication tagline or mission statement here.
			</p>
			<!-- /wp:paragraph -->

			<!-- wp:social-links {"size":"has-small-font-size","style":{"spacing":{"blockGap":"0.75rem"}},"layout":{"type":"flex","flexWrap":"nowrap"}} -->
			<ul class="wp-block-social-links has-small-font-size">
				<!-- wp:social-link {"url":"#","service":"twitter","label":"X / Twitter"} /-->
				<!-- wp:social-link {"url":"#","service":"facebook","label":"Facebook"} /-->
				<!-- wp:social-link {"url":"#","service":"instagram","label":"Instagram"} /-->
				<!-- wp:social-link {"url":"#","service":"youtube","label":"YouTube"} /-->
				<!-- wp:social-link {"url":"#","service":"rss","label":"RSS Feed"} /-->
			</ul>
			<!-- /wp:social-links -->

		</div>
		<!-- /wp:column -->

		<!-- Column 2: Sections -->
		<!-- wp:column {"width":"22.22%"} -->
		<div class="wp-block-column" style="flex-basis:22.22%">
			<!-- wp:heading {"level":3,"className":"np-footer__nav-heading","style":{"color":{"text":"rgba(248,248,246,0.6)"},"typography":{"fontSize":"0.6875rem","fontFamily":"var:preset|font-family|inter","fontWeight":"800","letterSpacing":"0.12em","textTransform":"uppercase"}}} -->
			<h3 class="np-footer__nav-heading" style="color:rgba(248,248,246,0.6)">Sections</h3>
			<!-- /wp:heading -->
			<!-- The site's real categories, which is what a newspaper's "Sections"
			     column is. This was a wp:navigation with menuSlug:"footer-column-1".
			     menuSlug is not a core/navigation attribute — core ignores it — so
			     this and the two navigations below all fell back to the same
			     auto-generated page list and rendered three identical menus in the
			     footer. That is the same defect WP.org ticket #280625 reported in
			     the header, one scroll further down. -->
			<!-- wp:categories {"showPostCounts":false,"className":"np-footer__nav"} /-->
		</div>
		<!-- /wp:column -->

		<!-- Column 3: Company -->
		<!-- wp:column {"width":"22.22%"} -->
		<div class="wp-block-column" style="flex-basis:22.22%">
			<!-- wp:heading {"level":3,"className":"np-footer__nav-heading","style":{"color":{"text":"rgba(248,248,246,0.6)"},"typography":{"fontSize":"0.6875rem","fontFamily":"var:preset|font-family|inter","fontWeight":"800","letterSpacing":"0.12em","textTransform":"uppercase"}}} -->
			<h3 class="np-footer__nav-heading" style="color:rgba(248,248,246,0.6)">Company</h3>
			<!-- /wp:heading -->
			<!-- The site's pages — About, Contact and the like — which is what a
			     "Company" column is. Deterministic and distinct from the categories
			     above; see the note in the Sections column. -->
			<!-- wp:page-list {"className":"np-footer__nav"} /-->
		</div>
		<!-- /wp:column -->

		<!-- Column 4: Subscribe -->
		<!-- wp:column {"width":"22.22%"} -->
		<div class="wp-block-column" style="flex-basis:22.22%">
			<!-- wp:heading {"level":3,"className":"np-footer__nav-heading","style":{"color":{"text":"rgba(248,248,246,0.6)"},"typography":{"fontSize":"0.6875rem","fontFamily":"var:preset|font-family|inter","fontWeight":"800","letterSpacing":"0.12em","textTransform":"uppercase"}}} -->
			<h3 class="np-footer__nav-heading" style="color:rgba(248,248,246,0.6)">Subscribe</h3>
			<!-- /wp:heading -->

			<!-- wp:paragraph {"style":{"color":{"text":"rgba(248,248,246,0.6)"},"typography":{"fontSize":"0.875rem","fontFamily":"var:preset|font-family|inter","lineHeight":"1.5"}}} -->
			<p style="color:rgba(248,248,246,0.6);font-family:var(--wp--preset--font-family--inter);font-size:0.875rem;line-height:1.5">
				Add your newsletter signup copy here.
			</p>
			<!-- /wp:paragraph -->

			<!-- wp:buttons {"style":{"spacing":{"blockGap":"0","margin":{"top":"1rem"}}}} -->
			<div class="wp-block-buttons" style="margin-top:1rem">
				<!-- wp:button {"backgroundColor":"accent-red","textColor":"paper-white"} -->
				<div class="wp-block-button">
					<a class="wp-block-button__link wp-element-button has-accent-red-background-color has-paper-white-color has-text-color has-background" href="#">Subscribe Now</a>
				</div>
				<!-- /wp:button -->
			</div>
			<!-- /wp:buttons -->
		</div>
		<!-- /wp:column -->

	</div>
	<!-- /wp:columns -->

	<!-- Bottom bar: copyright + legal nav -->
	<!-- wp:group {"className":"np-footer__bottom","layout":{"type":"flex","flexWrap":"wrap","justifyContent":"space-between","verticalAlignment":"center"}} -->
	<div class="wp-block-group np-footer__bottom">

		<!-- wp:paragraph {"className":"np-footer__copyright","style":{"color":{"text":"rgba(248,248,246,0.6)"},"typography":{"fontSize":"0.8125rem","fontFamily":"var:preset|font-family|inter"}},"metadata":{"bindings":{"content":{"source":"masthead/copyright"}}}} -->
		<p class="np-footer__copyright" style="color:rgba(248,248,246,0.6);font-family:var(--wp--preset--font-family--inter);font-size:0.8125rem"></p>
		<!-- /wp:paragraph -->

		<!-- A third navigation sat here with menuSlug:"footer-legal" and rendered the
		     same fallback page list as the two columns above it. There is no core
		     block for "legal pages" specifically, and inventing hardcoded English
		     Privacy/Terms links would put untranslatable prose back into a template.
		     So the bottom bar carries the copyright line alone; add a legal menu here
		     in the Site Editor once those pages exist. -->

	</div>
	<!-- /wp:group -->

</footer>
<!-- /wp:group -->
